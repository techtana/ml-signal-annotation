{% extends "base.html" %}

{% block title %}Pipeline job {{ job_id }}{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
    <div>
      <h1 class="h4 mb-1">Job {{ job_id }}</h1>
      <div class="text-secondary">Raw config entry.</div>
    </div>
    <a class="btn btn-outline-secondary" href="{{ url_for('pipeline.jobs') }}">Back</a>
  </div>

  <div class="card">
    <div class="card-body">
      <pre class="mb-0"><code>{{ response }}</code></pre>
    </div>
  </div>
{% endblock %}
