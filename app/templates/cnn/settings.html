{% extends "base.html" %}

{% block title %}Settings · CNN{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
    <div>
      <h1 class="h4 mb-1">CNN workflow settings</h1>
      <div class="text-secondary">Paths and parameters used by annotation/training/prediction pages.</div>
    </div>
  </div>

  <form class="card" method="post">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Data CSV</label>
          <input class="form-control" name="data_path" value="{{ cfg.data_path }}" />
          <div class="form-text">Default: <code>data/traces.csv</code></div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Artifacts directory</label>
          <input class="form-control" name="artifacts_dir" value="{{ cfg.artifacts_dir }}" />
        </div>

        <div class="col-md-6">
          <label class="form-label">Annotations CSV</label>
          <input class="form-control" name="annotation_path" value="{{ cfg.annotation_path }}" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Predictions CSV</label>
          <input class="form-control" name="output_path" value="{{ cfg.output_path }}" />
        </div>

        <div class="col-md-4">
          <label class="form-label">Group-by column</label>
          <input class="form-control" name="group_by_col" value="{{ cfg.group_by_col }}" />
        </div>
        <div class="col-md-4">
          <label class="form-label">Time/index column</label>
          <input class="form-control" name="time_index_col" value="{{ cfg.time_index_col }}" />
        </div>
        <div class="col-md-4">
          <label class="form-label">Channel columns (comma-separated)</label>
          <input class="form-control" name="channel_cols" value="{{ (cfg.channel_cols or [])|join(', ') }}" />
          <div class="form-text">Blank = auto-detect all non-index columns</div>
        </div>

        <div class="col-md-3">
          <label class="form-label">Trim ratio</label>
          <input class="form-control" name="trim_ratio" value="{{ cfg.trim_ratio }}" />
        </div>
        <div class="col-md-3">
          <label class="form-label">Test size</label>
          <input class="form-control" name="test_size" value="{{ cfg.test_size }}" />
        </div>
        <div class="col-md-3">
          <label class="form-label">Random state</label>
          <input class="form-control" name="random_state" value="{{ cfg.random_state }}" />
        </div>
        <div class="col-md-3">
          <label class="form-label">Batch size</label>
          <input class="form-control" name="batch_size" value="{{ cfg.batch_size }}" />
        </div>
        <div class="col-md-3">
          <label class="form-label">Epochs</label>
          <input class="form-control" name="num_epochs" value="{{ cfg.num_epochs }}" />
        </div>

        <div class="col-md-3">
          <label class="form-label d-block">Use GPU</label>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="use_gpu" {% if cfg.use_gpu %}checked{% endif %} />
            <label class="form-check-label text-secondary">If available</label>
          </div>
        </div>
        <div class="col-md-3">
          <label class="form-label">GPU memory fraction</label>
          <input class="form-control" name="gpu_memory_fraction" value="{{ cfg.gpu_memory_fraction or '' }}" />
          <div class="form-text">Blank = memory growth</div>
        </div>
      </div>
    </div>
    <div class="card-footer d-flex gap-2">
      <button class="btn btn-primary" type="submit">Save</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('cnn.annotate') }}">Back</a>
    </div>
  </form>
{% endblock %}
